
services:

  api:
    build: .
    environment:
      QDRANT_URL: http://qdrant:6333
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: password
      WEATHER_MCP_URL: http://weather-mcp:9001
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
    depends_on:
      - qdrant
      - neo4j
      - weather-mcp
    ports:
      - "${API_PORT:-8000}:8000"

  qdrant:
    image: qdrant/qdrant

  neo4j:
    image: neo4j
    environment:
      - NEO4J_AUTH=neo4j/password

  weather-mcp:
    build: .
    command: uvicorn tools.weather_mcp:app --host 0.0.0.0 --port 9001
